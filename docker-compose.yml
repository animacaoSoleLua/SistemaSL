services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slr}
      POSTGRES_USER: ${POSTGRES_USER:-slr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slrAdmin}
    ports:
      - "5453:5432"   # opcional (remova se não precisar acessar de fora)
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slr -d slr"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    working_dir: /backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://slr:slrAdmin@postgres:5432/slr}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      UPLOADS_DIR: /backend/uploads
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/backend/uploads
    restart: unless-stopped
    mem_limit: 1g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped
    mem_limit: 512m

volumes:
  postgres_data:
  backend_uploads:

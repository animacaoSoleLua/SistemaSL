services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: slr
      POSTGRES_USER: slr
      POSTGRES_PASSWORD: admin
    ports:
      - "5453:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slr -d slr"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /backend
    environment:
      DATABASE_URL: postgres://slr:admin@postgres:5432/slr
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma migrate deploy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /backend
    environment:
      DATABASE_URL: postgres://slr:admin@postgres:5432/slr
      HOST: 0.0.0.0
      PORT: 3001
      NODE_ENV: development
      # Substitua por uma chave real em produção (mín. 32 chars)
      JWT_SECRET: ${JWT_SECRET:-dev-secret-mude-isso-em-producao-32c}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      UPLOADS_DIR: /backend/uploads
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3001/api/v1/auth/google/callback}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    volumes:
      # Monta apenas o código-fonte — node_modules do build da imagem ficam intactos
      - ./backend/src:/backend/src
      - ./backend/prisma:/backend/prisma
      # Uploads persistem entre reinicios
      - backend_uploads:/backend/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      # URL acessível pelo browser do usuário (não de dentro do Docker)
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      # Monta apenas os diretórios de código — node_modules do build ficam intactos
      - ./frontend/app:/app/app
      - ./frontend/lib:/app/lib
      - ./frontend/assets:/app/assets
      - ./frontend/components:/app/components
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:

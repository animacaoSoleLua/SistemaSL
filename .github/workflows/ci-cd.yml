name: CI/CD

on:
  push:
    branches: [main]

jobs:
  test-backend:
    name: Testes Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: slr_test
          POSTGRES_USER: slr
          POSTGRES_PASSWORD: slrAdmin
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: backend

      - name: Gerar cliente Prisma
        run: npx prisma generate
        working-directory: backend

      - name: Aplicar migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://slr:slrAdmin@localhost:5432/slr_test

      - name: Rodar testes
        run: npm test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://slr:slrAdmin@localhost:5432/slr_test
          NODE_ENV: test

  test-frontend:
    name: Testes Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: frontend

      - name: Rodar testes
        run: npm test
        working-directory: frontend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    environment: production

    steps:
      - name: Deploy backend
        run: |
          curl -f -X POST "${{ secrets.DOKPLOY_BACKEND_WEBHOOK }}" \
            -H "Content-Type: application/json"

      - name: Deploy frontend
        run: |
          curl -f -X POST "${{ secrets.DOKPLOY_FRONTEND_WEBHOOK }}" \
            -H "Content-Type: application/json"
